# Karpathy Wiki ZH — GitHub Pages 配置
# 主题：使用 Jekyll 主题，让 GitHub Pages 更好地展示

title: Karpathy Wiki ZH
description: >-
  Andrej Karpathy 中文知识库 — 把 karpathy.ai 上所有的博客、视频、论文、课程、演讲、
  项目全部读完，用三岁小孩都能听懂的中文解释清楚。深度学习 / AI / 神经网络 / 中文学习资源。
lang: zh-CN
author: community
timezone: Asia/Shanghai

# SEO
google_site_verification:
logo: /assets/logo.png

# 社交
social:
  name: Karpathy Wiki ZH
  links:
    - https://github.com/YOUR_USERNAME/karpathy-wiki-zh

# 默认布局
defaults:
  - scope:
      path: ""
    values:
      layout: default
      lang: zh-CN

# 排除
exclude:
  - .omc/
  - .git/
  - README.md